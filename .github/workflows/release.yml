name: Release

# 'v' 로 시작하는 태그를 push 하면 (예: v0.1.0) 자동 빌드 + 배포
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 수동 실행도 허용

permissions:
  contents: write # GitHub Releases 에 업로드하기 위해 필요

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite bundle
        run: npm run build

      - name: Build & publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS: 서명 안 함 (Apple Developer 계정 없이 진행)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --publish always
